version: '3'

vars:
  DOCKER_IMAGE: ghcr.io/duobitx/yass-web-ui

tasks:
  default:
    cmds:
      - task --list
    silent: true

  install:
    desc: Install dependencies
    cmds:
      - npm install

  dev:
    desc: Start development server
    cmds:
      - npm run dev

  build:
    desc: Build the application for production
    cmds:
      - npm run build

  lint:
    desc: Run linter
    cmds:
      - npm run lint

  test:
    desc: Run tests
    cmds:
      - npm run test

  test:watch:
    desc: Run tests in watch mode
    cmds:
      - npm run test:watch

  docker:build:
    desc: Build docker image
    cmds:
      - docker build --no-cache -t {{.DOCKER_IMAGE}} .

  docker:run:
    desc: Run docker container
    cmds:
      - docker run -p 8080:8080 {{.DOCKER_IMAGE}}

  docker:push:
    desc: Push docker image to registry
    cmds:
      - docker push {{.DOCKER_IMAGE}}

  clean:
    desc: Clean up build artifacts and node_modules
    cmds:
      - rm -rf dist node_modules
