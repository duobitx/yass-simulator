apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: x
  name: yass-leader-election-rolebinding
  namespace: yass-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: yass-leader-election-role
subjects:
- kind: ServiceAccount
  name: yass-controller-manager
  namespace: yass-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: x
  name: yass-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: yass-yass-role
subjects:
- kind: ServiceAccount
  name: yass-controller-manager
  namespace: yass-system
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: x
    control-plane: controller-manager
  name: yass-controller-manager-metrics-service
  namespace: yass-system
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    app.kubernetes.io/name: x
    control-plane: controller-manager
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: yass-operator
  name: yass-webhook-service
  namespace: yass-system
spec:
  ports:
  - port: 443
    protocol: TCP
    targetPort: 9443
  selector:
    app.kubernetes.io/name: yass-operator
    control-plane: controller-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: yass
    control-plane: controller-manager
  name: yass-controller-manager
  namespace: yass-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: yass
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: yass
        control-plane: controller-manager
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        command:
        - /manager
        image: ghcr.io/duobitx/yass/yass-operators:latest
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: webhook-certs
          readOnly: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: yass-controller-manager
      terminationGracePeriodSeconds: 10
      volumes:
      - name: webhook-certs
        secret:
          secretName: webhook-server-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: yass-operator
  name: yass-metrics-certs
  namespace: yass-system
spec:
  dnsNames:
  - SERVICE_NAME.SERVICE_NAMESPACE.svc
  - SERVICE_NAME.SERVICE_NAMESPACE.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: yass-selfsigned-issuer
  secretName: metrics-server-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: yass-operator
  name: yass-serving-cert
  namespace: yass-system
spec:
  dnsNames:
  - yass-webhook-service.yass-system.svc
  - yass-webhook-service.yass-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: yass-selfsigned-issuer
  secretName: webhook-server-cert
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
    app.kubernetes.io/name: yass-operator
  name: yass-selfsigned-issuer
  namespace: yass-system
spec:
  selfSigned: {}
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: yass-system/yass-serving-cert
  name: yass-mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: yass-webhook-service
      namespace: yass-system
      path: /mutate-yass-int-esa-yass-v1-experiment
  failurePolicy: Fail
  name: mexperiment-v1.kb.io
  rules:
  - apiGroups:
    - yass.int.esa.yass
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - experiments
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: yass-system/yass-serving-cert
  name: yass-validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: yass-webhook-service
      namespace: yass-system
      path: /validate-yass-int-esa-yass-v1-experiment
  failurePolicy: Fail
  name: vexperiment-v1.kb.io
  rules:
  - apiGroups:
    - yass.int.esa.yass
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - experiments
  sideEffects: None
