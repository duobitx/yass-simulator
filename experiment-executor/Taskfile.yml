version: '3'

vars:
  TARGETARCH: 'amd64'
  TARGETOS:   'linux'

silent: true

tasks:
  build:
    desc: Build the experiment-executor binary
    env:
      CGO_ENABLED: '0'
      GOOS:   '{{.TARGETOS}}'
      GOARCH: '{{.TARGETARCH}}'
    sources:
      - '**/*.go'
      - go.mod
      - exclude: '**/*_test.go'
    cmds:
      - go build -o main -a .

  test:
    deps:
      - build
    desc: Run tests
    cmds:
      - go test ./...

  default:
    desc: Alias to build
    cmds:
      - task: build
      - task: test
