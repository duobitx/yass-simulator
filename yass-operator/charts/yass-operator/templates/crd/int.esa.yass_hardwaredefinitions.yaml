{{- if .Values.crd.enable }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.19.0
  name: hardwaredefinitions.int.esa.yass
spec:
  group: int.esa.yass
  names:
    kind: HardwareDefinition
    listKind: HardwareDefinitionList
    plural: hardwaredefinitions
    singular: hardwaredefinition
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.cpu
      name: CPU
      type: string
    - jsonPath: .spec.memory
      name: Memory
      type: string
    - jsonPath: .spec.diskSpace
      name: DiskSpace
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: "HardwareDefinition is a cluster-scoped, reusable hardware profile
          that models\nthe platform a satellite or ground station is built on: CPU,
          memory, persistent\nstorage, battery capacity and a coarse energy-consumption
          model.\n\nIn the typical workflow a HardwareDefinition is referenced by
          name from a\nLayout entry (`hardwareSpecRef: sentinel-2`) so the same profile
          can back many\nFsNodes across many experiments. For one-off tweaks the same
          Spec may be\ninlined directly on the FsNode/Layout entry via [EmbeddedHardware].\n\nThe
          values land in two distinct enforcement paths:\n  - CPU, memory and disk
          become real Kubernetes resource requests/limits on\n    the FsNode's Pod,
          so they participate in normal scheduling and eviction.\n  - Battery and
          energy values are *simulated* — the world-controller maintains\n    a battery
          model from these inputs and publishes the current state on the\n    MQTT
          topic `<fsNode>/resources`.\n\nExample:\n\n\tapiVersion: int.esa.yass/v1\n\tkind:
          HardwareDefinition\n\tmetadata:\n\t  name: sentinel-2\n\tdescription: \"Sentinel-2
          (MSI) — Optical MSI, 13 bands ...\"\n\tspec:\n\t  cpu: \"1500m\"\n\t  memory:
          \"2Gi\"\n\t  diskSpace: \"150Gi\"\n\t  batteryCapacityWh: 15000\n\t  batteryChargeW:
          1700\n\t  lowPowerThresholdWh: 1500\n\t  energyConsumption:\n\t    normalPowerBaseW:
          1500\n\t    lowPowerBaseW: 900\n\t    perkByteTXWh: 0.00001\n\t    perkByteDiskWR:
          0.00002\n\t    perkByteDiskRD: 0.00001"
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          description:
            description: |-
              Description is a free-form human-readable summary of the modelled platform
              (mission name, on-board storage, downlink class, launch year, ...). Not
              consumed by the simulator — purely for cluster operators reading
              `kubectl get hardwaredefinition -o yaml`.
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              Spec is the actual hardware profile. Optional only to permit a
              description-only stub during authoring; an FsNode that selects this profile
              will fail validation if Spec is missing.
            properties:
              batteryCapacityWh:
                description: |-
                  BatteryCapacityWh is the total usable battery capacity in watt-hours.
                  The simulated state-of-charge starts at this value and is decremented by
                  the EnergyConsumption model below.
                type: number
              batteryChargeW:
                description: |-
                  BatteryChargeW is the average charge power in watts (e.g. from solar panels
                  during illuminated orbit). For ground stations set it large enough to keep
                  the battery effectively full. Optional, defaults to 0 (no recharge).
                type: number
              cpu:
                anyOf:
                - type: integer
                - type: string
                description: |-
                  CPU available to the node. Used as the request and limit on the FsNode Pod
                  (Kubernetes `resource.Quantity`, e.g. `1500m` or `2`). The KinD CPU
                  over-subscription trick documented in NOTES.md applies here.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              diskSpace:
                anyOf:
                - type: integer
                - type: string
                description: |-
                  DiskSpace is the hard `emptyDir.sizeLimit` for the engine container's scratch
                  volume (`/tmp`). Exceeding it causes kubelet to evict the pod (no graceful
                  ENOSPC).

                  It does NOT limit `/mnt/transfer` or the agent's `/tmp` — those are reported
                  as soft signals on the `<fsNode>/resources` MQTT topic and are expected to
                  be respected by the engine itself.

                  If not defined the volume is unlimited.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              energyConsumption:
                description: |-
                  EnergyConsumption describes the per-component power draw used by the
                  simulated battery model. Optional — fields default to 0, which is suitable
                  for ground stations or for tests that do not exercise power management.
                properties:
                  lowPowerBaseW:
                    description: |-
                      LowPowerBaseW is the baseline draw (watts) when the node is in low-power mode
                      (state-of-charge dropped below LowPowerThresholdWh). Typically lower than
                      NormalPowerBaseW. Optional — defaults to 0.
                    type: number
                  normalPowerBaseW:
                    description: |-
                      NormalPowerBaseW is the baseline draw (watts) when the node is in normal
                      power mode — covers always-on subsystems regardless of activity.
                    type: number
                  perkByteDiskRD:
                    description: PerkByteDiskRD is the energy cost per kilobyte read
                      from disk, in watt-hours.
                    type: number
                  perkByteDiskWR:
                    description: PerkByteDiskWR is the energy cost per kilobyte written
                      to disk, in watt-hours.
                    type: number
                  perkByteTXWh:
                    description: |-
                      PerkByteTXWh is the energy cost per kilobyte transmitted, in watt-hours.
                      Charged for every byte the engine sends out of the node.
                    type: number
                required:
                - normalPowerBaseW
                type: object
              lowPowerThresholdWh:
                description: |-
                  LowPowerThresholdWh sets the state-of-charge at which the node transitions
                  to low-power mode. In low-power mode the world-controller switches the base
                  draw to `EnergyConsumption.LowPowerBaseW` and the agent is expected to back
                  off any non-essential activity (the current power mode is published on the
                  `<fsNode>/resources` topic).
                  Optional — defaults to 0 (never enter low-power mode).
                type: number
              memory:
                anyOf:
                - type: integer
                - type: string
                description: Memory available to the node. Used as the request and
                  limit on the FsNode Pod.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
            required:
            - batteryCapacityWh
            - cpu
            - memory
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end -}}
