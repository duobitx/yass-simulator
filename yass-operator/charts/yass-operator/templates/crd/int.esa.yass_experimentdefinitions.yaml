{{- if .Values.crd.enable }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  labels:
    {{- include "chart.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.crd.keep }}
    "helm.sh/resource-policy": keep
    {{- end }}
    controller-gen.kubebuilder.io/version: v0.19.0
  name: experimentdefinitions.int.esa.yass
spec:
  group: int.esa.yass
  names:
    kind: ExperimentDefinition
    listKind: ExperimentDefinitionList
    plural: experimentdefinitions
    singular: experimentdefinition
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.model
      name: Model
      type: string
    - jsonPath: .spec.maxDuration
      name: MaxDuration
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: "ExperimentDefinition is the *scenario* of an experiment: per-node
          behaviour\n(which agent image runs on which FsNode, with which environment)
          and any\nscheduled hardware events. It deliberately knows nothing about
          the physical\nplacement of nodes — that is the job of a [Layout] — so the
          same definition\ncan be replayed against different constellations.\n\nOne
          ExperimentDefinition pairs with one Layout inside an [Experiment]. The\nnode
          names in `spec.behaviours[].fsNode` must match `fsNode` entries in the\nchosen
          Layout; the experiment-executor refuses to start otherwise.\n\nExample:\n\n\tapiVersion:
          int.esa.yass/v1\n\tkind: ExperimentDefinition\n\tmetadata:\n\t  name: spain-shot\n\tspec:\n\t
          \ maxDuration: 6h\n\t  behaviours:\n\t    - fsNode: oneweb-0008\n\t      agent:\n\t
          \       image: ghcr.io/duobitx/yass-agent-periodic\n\t        envsMap:\n\t
          \         PHOTO_TARGETS: \"spain:40.4:-3.7:500\"\n\t          FILE_SIZE:
          \"2G\"\n\t          MAX_PHOTOS: \"1\"\n\t    - fsNode: estrack-kiruna\n\t
          \     agent:\n\t        image: ghcr.io/duobitx/yass-agent-receive-only\n\t
          \       envsMap:\n\t          END_ON_ANY: \"true\""
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          description:
            description: Description is a free-form human-readable summary of the
              scenario.
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec is the actual scenario body. See [ExperimentDefinitionSpec].
            properties:
              behaviours:
                description: |-
                  Behaviours describes one agent payload per FsNode. The list is keyed by
                  `fsNode`, so each node may appear at most once. A behaviour MUST exist for
                  every FsNode in the paired Layout; a missing entry means "no agent" which
                  is almost always a misconfiguration.
                items:
                  description: |-
                    Behaviour binds an agent payload to a single named FsNode. The FsNode name is
                    the join key against the [Layout] used in the same [Experiment].
                  properties:
                    agent:
                      description: |-
                        Agent is the user-supplied workload container for this node. See
                        [SimpleContainer]; the agent image is expected to follow the YASS agent
                        conventions (consumes well-known env vars, talks to the world-controller
                        over MQTT, drops files into `/mnt/transfer`).
                      properties:
                        configurationFilesFromConfigMap:
                          description: |-
                            ConfigurationFilesFromConfigMap optionally mounts a ConfigMap as files inside
                            the container — useful for shipping per-experiment agent configuration without
                            rebuilding the image.
                          properties:
                            configMapRef:
                              description: ConfigMapRef is the name of the ConfigMap
                                to mount.
                              type: string
                            mountPath:
                              description: |-
                                MountPath is the absolute path inside the container where the ConfigMap's
                                keys will be exposed as files.
                              type: string
                          required:
                          - configMapRef
                          - mountPath
                          type: object
                        envsMap:
                          additionalProperties:
                            type: string
                          description: |-
                            Envs is an additional set of environment variables injected into the container.
                            The operator merges these with the FsNode's `spec.properties` and a handful
                            of well-known YASS variables (node name, MQTT broker address, ...).
                          type: object
                        image:
                          description: Image is the container image reference (e.g.
                            `ghcr.io/duobitx/yass-agent-periodic`).
                          type: string
                      required:
                      - image
                      type: object
                    fsNode:
                      description: |-
                        FsNodeName is the name of the satellite or ground station this behaviour
                        targets. Must match a `fsNode` entry in the Layout.
                      type: string
                    hardwareEvents:
                      description: |-
                        HardwareEvents is the list of scheduled hardware faults injected into
                        this node by the world-controller. See [HardwareEvent] and
                        yass-docs/hardware-events-spec.md.
                      items:
                        description: |-
                          HardwareEvent declares a scheduled hardware fault injected by the
                          world-controller into the simulated platform of an FsNode. Faults
                          affect ONLY the agent and the fs-engine container — the
                          world-controller and any system containers continue to run so the
                          failure can be observed and (where applicable) cleared.

                          Timing:
                            - StartOffset is relative to the experiment's `t=0`. Go-duration
                              format (`10s`, `5m`, `2h30m`).
                            - Either Duration (one-shot) or Schedule (recurring) is set, but
                              never both. For Destroy neither is allowed — Destroy is
                              instantaneous and terminal.

                          Overlap rule: at most one event of the same Type may be active on a
                          node at once. A second occurrence overlapping an already-active one
                          of the same type is dropped and reported as `dropped_overlap` on
                          `hardware-events/<fsNode>`.
                        properties:
                          duration:
                            description: |-
                              Duration is the wall-clock length of a single one-shot event.
                              Go-duration format. Mutually exclusive with Schedule; ignored
                              (and rejected) for Destroy.
                            type: string
                          name:
                            description: |-
                              Name is a stable identifier within the event list. Used as the
                              `name` label on emitted MQTT/K8s events so dashboards can
                              correlate activate/clear pairs. Optional; operator synthesises
                              `<type>-<index>` if missing.
                            type: string
                          params:
                            description: Params carries type-specific tuning knobs.
                            properties:
                              networkBandwidth:
                                description: NetworkBandwidth is required for NetworkBandwidthReduced.
                                properties:
                                  capBitsPerSec:
                                    description: |-
                                      CapBitsPerSec is the hard throughput cap in bits per second.
                                      Effective rate = min(orbital, this).
                                    format: int64
                                    minimum: 1
                                    type: integer
                                  reductionPercent:
                                    description: |-
                                      ReductionPercent reduces the current effective bandwidth by this
                                      fraction. 25 = "drop to 75% of the natural cap".
                                    format: int32
                                    maximum: 99
                                    minimum: 1
                                    type: integer
                                type: object
                                x-kubernetes-validations:
                                - message: Exactly one of capBitsPerSec or reductionPercent
                                    must be set.
                                  rule: (has(self.capBitsPerSec) && !has(self.reductionPercent))
                                    || (!has(self.capBitsPerSec) && has(self.reductionPercent))
                            type: object
                          schedule:
                            description: |-
                              Schedule turns the event into a recurring fault — see
                              HardwareEventSchedule. Mutually exclusive with Duration.
                            properties:
                              durationJitterPercent:
                                description: |-
                                  DurationJitterPercent — same semantics as IntervalJitterPercent
                                  but applied to occurrence duration.
                                format: int32
                                maximum: 100
                                minimum: 0
                                type: integer
                              durationMean:
                                description: DurationMean is the average length of
                                  each occurrence.
                                type: string
                              intervalJitterPercent:
                                description: |-
                                  IntervalJitterPercent makes the actual interval uniformly random
                                  in `[mean*(1-p/100), mean*(1+p/100)]`. 0 = deterministic.
                                format: int32
                                maximum: 100
                                minimum: 0
                                type: integer
                              intervalMean:
                                description: |-
                                  IntervalMean is the average wall-clock time between the *start*
                                  of two consecutive occurrences. Go-duration format.
                                type: string
                              maxOccurrences:
                                description: |-
                                  MaxOccurrences caps the total number of times this event fires.
                                  0 (default) = unlimited until experiment end.
                                format: int32
                                minimum: 0
                                type: integer
                              seed:
                                description: |-
                                  Seed lets a recurring event be reproduced bit-for-bit across
                                  re-runs. If unset, the world-controller seeds from
                                  `fsNode + event-name` so different runs of the same experiment
                                  share a schedule.
                                format: int64
                                type: integer
                            required:
                            - durationMean
                            - intervalMean
                            type: object
                          startOffset:
                            description: |-
                              StartOffset is the Go-duration offset from experiment start at
                              which the first occurrence fires. For a Schedule this is the
                              earliest time the first occurrence may happen; subsequent
                              occurrences are spaced by Schedule.IntervalMean ± jitter.
                            type: string
                          type:
                            description: Type selects which fault to inject. See HardwareEventType.
                            enum:
                            - NetworkBandwidthReduced
                            - NetworkFailure
                            - DiskFull
                            - DiskFailure
                            - Destroy
                            type: string
                        required:
                        - startOffset
                        - type
                        type: object
                        x-kubernetes-validations:
                        - message: One-shot events require duration; recurring events
                            require schedule; Destroy allows neither.
                          rule: 'self.type == ''Destroy'' ? (!has(self.duration) &&
                            !has(self.schedule)) : ((has(self.duration) && !has(self.schedule))
                            || (!has(self.duration) && has(self.schedule)))'
                        - message: NetworkBandwidthReduced requires params.networkBandwidth.
                          rule: 'self.type == ''NetworkBandwidthReduced'' ? (has(self.params)
                            && has(self.params.networkBandwidth)) : true'
                      type: array
                  required:
                  - agent
                  - fsNode
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - fsNode
                x-kubernetes-list-type: map
              maxDuration:
                description: |-
                  MaxDuration is the wall-clock budget for the experiment, expressed in
                  Go-duration format (e.g. `6h`, `30m`, `90s`). When exceeded the
                  experiment-executor moves the parent [Experiment] to `TimedOut`. Optional —
                  omit for an open-ended run (then end-of-experiment depends on agent signals
                  such as `END_ON_ANY`).
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end -}}
