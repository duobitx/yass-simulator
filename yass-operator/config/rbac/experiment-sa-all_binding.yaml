# Grants the per-experiment service accounts (yass-experiment-sa, created in
# every experiment namespace) access to the int.esa.yass resources they manage.
# Without this the executor and FsNode init containers fail "forbidden" and the
# experiment never leaves Init. Bound to system:serviceaccounts because the SAs
# are created dynamically per experiment namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/name: yass
    app.kubernetes.io/managed-by: kustomize
  name: yass-experiment-sa-all
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: experiment-role
subjects:
- apiGroup: rbac.authorization.k8s.io
  kind: Group
  name: system:serviceaccounts
