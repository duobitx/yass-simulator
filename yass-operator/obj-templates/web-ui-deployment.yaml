apiVersion: apps/v1
kind: Deployment
metadata:
  name: yass-web-ui
  labels:
    app: yass-web-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yass-web-ui
  template:
    metadata:
      labels:
        app: yass-web-ui
    spec:
      serviceAccountName: yass-experiment-sa
      initContainers:
        - name: wait-for-experiment-executor
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://experiment-executor:8080/ ; do
                echo "waiting for experiment-executor"; sleep 2
              done
        - name: wait-for-events-webapp
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://events-webapp:8080/ ; do
                echo "waiting for events-webapp"; sleep 2
              done
      containers:
      - name: yass-web-ui
        image: ghcr.io/duobitx/yass-web-ui:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "800m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
