apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: experiment-executor
spec:
  serviceName: experiment-executor
  replicas: 1
  selector:
    matchLabels:
      app: experiment-executor
  template:
    metadata:
      labels:
        app: experiment-executor
    spec:
      serviceAccountName: "yass-experiment-sa"
      terminationGracePeriodSeconds: 10
      initContainers:
        - name: resource-to-json-experiment
          image: "{{ .Values.internalComponentImage }}"
          imagePullPolicy: "{{ .Values.imagePullPolicy }}"
          command:
            - "/resource-to-json"
          env:
            - name: RESOURCE_KIND
              value: "Experiment"
            - name: DST_DIR
              value: "/mnt/shared"
            - name: RESOURCE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['yass-experiment']
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - mountPath: /mnt/shared
              name: shared
      containers:
        - name: experiment-executor
          image: "{{ .Values.internalComponentImage }}"
          imagePullPolicy: "{{ .Values.imagePullPolicy }}"
          command:
            - "/experiment-executor"
          ports:
            - containerPort: 8080
          env:
            - name: YASS_EXPERIMENT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['yass-experiment']
            - name: EXPERIMENT_FILE
              value: "/mnt/shared/experiment.json"
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - mountPath: /mnt/shared
              name: shared
          # startupProbe gives the executor up to 5 min to come up
          # (geo-calc subprocess + initial position sync) without the
          # liveness clock ticking. Once it passes, liveness/readiness
          # take over with a generous failure window so a single slow
          # tick does not kill an otherwise healthy pod.
          startupProbe:
            httpGet:
              port: 8080
              path: "/"
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              port: 8080
              path: "/"
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              port: 8080
              path: "/"
            periodSeconds: 30
            failureThreshold: 6
      volumes:
        - name: shared
          emptyDir:
            sizeLimit: 2M
