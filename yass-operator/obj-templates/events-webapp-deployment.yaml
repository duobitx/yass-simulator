apiVersion: apps/v1
kind: Deployment
metadata:
  name: events-webapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: events-webapp
  template:
    metadata:
      labels:
        app: events-webapp
    spec:
      serviceAccountName: yass-experiment-sa
      initContainers:
        - name: wait-for-experiment-executor
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://experiment-executor:8080/ ; do
                echo "waiting for experiment-executor"; sleep 2
              done
      containers:
        - name: events-webapp
          image: "{{ .Values.internalComponentImage }}"
          imagePullPolicy: "{{ .Values.imagePullPolicy }}"
          command:
            - "/events-webapp"
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "800m"
              memory: "256Mi"