apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-bridge
  template:
    metadata:
      labels:
        app: metrics-bridge
        yass.observability/role: metrics-bridge
    spec:
      serviceAccountName: yass-experiment-sa
      initContainers:
        - name: wait-for-messaging
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z messaging 1883; do
                echo "waiting for messaging"; sleep 2
              done
      containers:
        - name: metrics-bridge
          image: "{{ .Values.internalComponentImage }}"
          imagePullPolicy: "{{ .Values.imagePullPolicy }}"
          command:
            - "/metrics-bridge"
          # No HTTP port / probes in v2 — bridge speaks MQTT only.
          # See yass-docs/observability-v2-spec.md §6.
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MESSAGING_BROKER_HOST_PORT
              value: "messaging:1883"
          volumeMounts:
            - name: exports
              mountPath: /var/yass-observability/exports
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: exports
          hostPath:
            path: /var/yass-observability/exports
            type: DirectoryOrCreate
