version: '3'

vars:
  VERSION:
    sh: "v=$(git describe --tags --exact-match 2>/dev/null || true); if [ -n \"$v\" ]; then echo \"${v#v}\"; else echo latest; fi"
  IMG: 'ghcr.io/duobitx/yass-operator:{{.VERSION}}'

tasks:
  default:
    desc: Run Makefile default target
    cmds:
      - make IMG={{.IMG}}
      - make build-installer IMG={{.IMG}}
      # FIXME - make docker-buildx
      - make docker-build IMG={{.IMG}}
      - make docker-push IMG={{.IMG}}
      - 'echo "📦 pushed {{.IMG}}"'

  help:
    desc: Display Makefile help
    cmds:
      - make help

  make:
    desc: "Run any Makefile target (example: task make -- test)"
    cmds:
      - make {{.CLI_ARGS}}
