name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.25'
  GOPRIVATE: github.com/duobitx/*,github.com/ESA-PhiLab/*
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

