  build-push:
   name: Build - Push via Taskfile
   if: github.ref == 'refs/heads/main'
   runs-on: ubuntu-latest
   needs: lint-test
   permissions:
     contents: read
     packages: write
   steps:
     - name: Checkout code
       uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1

     - name: Login to Docker image registry
       uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef  # v3.6.0
       with:
         registry: ${{ env.REGISTRY }}
         username: ${{ github.actor }}
         password: ${{ secrets.GITHUB_TOKEN }}

     - name: Get Docker metadata
       id: meta
       uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5.10.0
       with:
         images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
         tags: |
           type=ref,event=tag
           type=ref,event=pr
           type=raw,value=latest,enable={{is_default_branch}}

     - name: Configure Git for private Go modules
       run: |
         git config --global url."https://${{ secrets.GH_REPO_READ_TOKEN }}@github.com/duobitx/".insteadOf "https://github.com/duobitx/"

     - name: Setup Go
       uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c  # v6.1.0
       with:
         go-version: ${{ env.GO_VERSION }}

     - name: Install protoc
       uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b  # v3.0.0
       with:
         version: '25.x'
         repo-token: ${{ secrets.GITHUB_TOKEN }}

     - name: Install Task
       uses: arduino/setup-task@b91d5d2c96a56797b48ac1e0e89220bf64044611  # v2.0.0
       with:
         version: 3.x

     - name: Run default task
       run: task
