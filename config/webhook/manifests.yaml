---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-yass-int-esa-yass-v1-experiment
  failurePolicy: Fail
  name: mexperiment-v1.kb.io
  rules:
  - apiGroups:
    - yass.int.esa.yass
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - experiments
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-yass-int-esa-yass-v1-experiment
  failurePolicy: Fail
  name: vexperiment-v1.kb.io
  rules:
  - apiGroups:
    - yass.int.esa.yass
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - experiments
  sideEffects: None
